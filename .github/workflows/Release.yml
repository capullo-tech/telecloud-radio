name: Release

on:
  push:
    # Only version tags publish a GitHub Release. Regular pushes still run Build.yml on their own,
    # so the APK is available as a workflow artifact -- this keeps every push from republishing a
    # public `preview` prerelease (clutter on a public repo). Tag with `vX.Y.Z` to cut a release.
    tags:
      - 'v*' # e.g. v1.0, v20.15.10

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml
    # Reusable workflows don't get the repo secrets unless we pass them through - without this the
    # release build has no signing keystore and emits an UNSIGNED APK (green, but un-installable).
    secrets: inherit
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project sources
        uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: telecloud-radio-${{ github.sha }}
          path: ./artifacts
      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          gh release create "$tag" --generate-notes
          apk_file=$(find ./artifacts -name "*.apk" | head -1)
          gh release upload "$tag" "$apk_file#telecloud-radio-$tag.apk"
