name: Release

on:
  push:
    # Only version tags publish a GitHub Release. Regular pushes still run Build.yml on their own,
    # so the APK is available as a workflow artifact -- this keeps every push from republishing a
    # public `preview` prerelease (clutter on a public repo). Tag with `vX.Y.Z` to cut a release.
    tags:
      - 'v*' # e.g. v1.0, v20.15.10

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml
    # Reusable workflows don't get the repo secrets unless we pass them through - without this the
    # release build has no signing keystore and emits an UNSIGNED APK (green, but un-installable).
    secrets: inherit
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project sources
        uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: telecloud-radio-${{ github.sha }}
          path: ./artifacts
      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          # Idempotent: on a RE-CUT the tag is force-moved and this workflow re-runs while the GitHub
          # Release from the prior cut still exists - a bare `gh release create` would fail with HTTP
          # 422 "already exists". Create only if absent; the upload below is already --clobber, so the
          # whole job is safely re-runnable without the manual `gh release delete` dance.
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --generate-notes
          apk_file=$(find ./artifacts -name "*.apk" | head -1)
          # Rename the file itself (gh's `#label` only sets a display label, not the asset name).
          cp "$apk_file" "telecloud-radio-$tag.apk"
          gh release upload "$tag" "telecloud-radio-$tag.apk" --clobber
