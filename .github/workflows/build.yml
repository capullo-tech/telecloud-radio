name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project sources
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      # TDLib (client + prebuilt .so) resolves transitively from the capullo-source-telegram jitpack
      # dependency (which depends on lib-tdlib-android) - no setup_tdlib.sh / git-lfs step anymore.
      - name: Check spotless
        run: ./gradlew spotlessCheck --no-configuration-cache
      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          fi
      # ubuntu-latest ships the Android SDK. No submodules; lib-snapcast-android resolves from jitpack.
      # Release build is signed with the release keystore (from secrets); without the secrets it
      # still builds, just unsigned.
      - name: Build APK
        env:
          RELEASE_KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease
      - name: Upload build outputs (APK)
        uses: actions/upload-artifact@v4
        with:
          name: telecloud-radio-${{ github.sha }}
          path: '**/build/outputs/apk/release/*.apk'
