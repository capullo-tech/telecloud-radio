name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project sources
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      # TDLib (client + prebuilt .so) resolves transitively from the capullo-source-telegram jitpack
      # dependency (which depends on lib-tdlib-android) - no setup_tdlib.sh / git-lfs step anymore.
      - name: Check spotless
        run: ./gradlew spotlessCheck --no-configuration-cache
      # ubuntu-latest ships the Android SDK. No submodules; lib-snapcast-android resolves from jitpack.
      - name: Build APK
        run: ./gradlew :app:assembleDebug
      - name: Upload build outputs (APK)
        uses: actions/upload-artifact@v4
        with:
          name: telecloud-radio-${{ github.sha }}
          path: '**/build/outputs/apk/debug/*.apk'
